<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anmelden</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{
background:#f2f2f7;
height:100vh;
}

.page{
display:none;
height:100vh;
}

.active{
display:flex;
flex-direction:column;
}

.login{
justify-content:center;
align-items:center;
padding:30px;
}

.logo{
font-size:38px;
font-weight:700;
margin-bottom:50px;
}

input{
width:100%;
padding:16px;
border-radius:12px;
border:none;
margin-bottom:15px;
font-size:17px;
background:white;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#007AFF;
color:white;
font-size:18px;
font-weight:bold;
}

.header{
background:white;
padding:22px;
font-size:25px;
font-weight:bold;
box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.content{
padding:20px;
}

.cardBtn{

background:white;
padding:20px;
border-radius:20px;
margin-top:20px;
font-size:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);

}

.cardBtn:hover{
transform:scale(1.02);
cursor:pointer;
}

.membership{

width:100%;
max-width:360px;
height:220px;

background:linear-gradient(135deg,#0046d5,#00bfff);

margin:auto;
margin-top:60px;

border-radius:25px;

color:white;

padding:25px;

box-shadow:0 20px 50px rgba(0,0,0,.25);

animation:show .5s;

position:relative;

overflow:hidden;

}

.membership:before{

content:"";

position:absolute;

top:-80px;

right:-80px;

width:180px;

height:180px;

background:rgba(255,255,255,.15);

border-radius:50%;

}

@keyframes show{

from{
opacity:0;
transform:translateY(30px);
}

to{
opacity:1;
transform:none;
}

}

.title{

font-size:24px;
font-weight:bold;

}

.name{

margin-top:60px;
font-size:22px;

}

.number{

margin-top:10px;
letter-spacing:2px;

}

.qr{

margin-top:20px;

width:80px;

height:80px;

background:white;

color:black;

display:flex;

align-items:center;

justify-content:center;

font-size:10px;

font-weight:bold;

}

.back{

padding:20px;

font-size:18px;

color:#007AFF;

cursor:pointer;

}

</style>

</head>

<body>

<div id="login" class="page active login">

<div class="logo">
Kundenportal
</div>

<input placeholder="E-Mail">

<input placeholder="Passwort" type="password">

<button onclick="login()">
Anmelden
</button>

</div>

<div id="dashboard" class="page">

<div class="header">
Willkommen 👋
</div>

<div class="content">

<div class="cardBtn" onclick="openCard()">

💳 StudiCard

</div>

<div class="cardBtn">

📄 eCampus

</div>

<div class="cardBtn">

⚙️ Einstellungen

</div>

</div>

</div>

<div id="cardPage" class="page">

<div class="back" onclick="backDashboard()">

← Zurück

</div>

<div class="membership">

<div class="title">

Digitale Studicard

</div>

<div class="name">

Kilian zinowsky

</div>

<div class="number">

Nr. 8427 1938

</div>

<div class="qr">

QR CODE

</div>

</div>

</div>

<script>

function login(){

document.getElementById("login").classList.remove("active");

document.getElementById("dashboard").classList.add("active");

}

function openCard(){

document.getElementById("dashboard").classList.remove("active");

document.getElementById("cardPage").classList.add("active");

}

function backDashboard(){

document.getElementById("cardPage").classList.remove("active");

document.getElementById("dashboard").classList.add("active");

}

</script>

</body>

</html>
